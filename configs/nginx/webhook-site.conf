# Replace example.com and webhook.example.com with your domains.
# The app listens on 127.0.0.1:8080 when docker-compose exposes APP_PORT=8080.

upstream webhook_site {
    server 127.0.0.1:8080;
    keepalive 32;
}

# Add these locations to your existing root-domain HTTPS server block.
server {
    listen 443 ssl http2;
    server_name example.com www.example.com;

    # ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

    location = /webhook {
        return 308 https://webhook.example.com/$is_args$args;
    }

    location ~ ^/webhook/(.*)$ {
        return 308 https://webhook.example.com/$1$is_args$args;
    }

    # Keep the rest of your existing root-domain locations here.
}

server {
    listen 443 ssl http2;
    server_name webhook.example.com;

    # ssl_certificate /etc/letsencrypt/live/webhook.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/webhook.example.com/privkey.pem;

    client_max_body_size 5m;

    location / {
        proxy_pass http://webhook_site;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }
}

server {
    listen 80;
    server_name webhook.example.com;
    return 308 https://webhook.example.com$request_uri;
}

server {
    listen 80;
    server_name example.com www.example.com;

    location = /webhook {
        return 308 https://webhook.example.com/$is_args$args;
    }

    location ~ ^/webhook/(.*)$ {
        return 308 https://webhook.example.com/$1$is_args$args;
    }

    return 308 https://$host$request_uri;
}
